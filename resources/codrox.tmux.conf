# Codrox tmux configuration
# Applied automatically to Codrox tmux sessions

# Use 256 colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Disable status bar — Codrox has its own UI
set -g status off

# Mouse support for resize/scroll
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Pane borders — match Codrox design
set -g pane-border-style "fg=#2a2a32"
set -g pane-active-border-style "fg=#7c6af7"

# No delay on escape
set -sg escape-time 0

# Increase scrollback
set -g history-limit 50000

# Window title
set -g set-titles on
set -g set-titles-string "#{pane_title}"

# Aggressive resize — smallest client viewing
setw -g aggressive-resize on

# Don't rename windows automatically
set -g allow-rename off
